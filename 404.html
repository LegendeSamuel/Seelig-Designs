<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <title>Seite nicht gefunden – Seelig Designs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preload" href="fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" href="favicon.ico" type="image/png">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .error-page .code {
      font-size: clamp(5rem, 20vw, 11rem);
      font-weight: 200;
      color: #F2A007;
      line-height: 1;
    }
    .error-page h1 { text-transform: none; }
    .error-page p { max-width: 460px; color: #d0d0d0; }
    .error-links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
    .error-logo { height: 2.5rem; margin-bottom: 1rem; }
  </style>
</head>

<body>
  <main class="error-page">
    <img src="img/Left_Logo_Name_wht.svg" alt="Seelig Designs Logo" class="error-logo">
    <div class="code">404</div>
    <h1>Diese Seite gibt es nicht.</h1>
    <p>Der gesuchte Moment ist wohl davongeflogen. Kehr zurück zur Startseite oder wirf einen Blick in die Galerie.</p>
    <div class="error-links">
      <a href="index.html" class="cta-button">Startseite</a>
      <a href="gallery.html" class="cta-button">Galerie</a>
    </div>
  </main>
</body>

</html>
<!-- IE needs 512+ bytes: https://docs.microsoft.com/archive/blogs/ieinternals/friendly-http-error-pages -->
